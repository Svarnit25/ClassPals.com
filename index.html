<!-- ==========================================
     PARENTAL CONTROLS & ACCOUNT MANAGEMENT APP
     ========================================== -->

<!-- 1. MODERN CSS STYLES (Keeps inputs clean and fixes raw layout bugs) -->
<style>
    /* Parent Overlay Container */
    .parental-modal-overlay {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: rgba(15, 23, 42, 0.6);
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        z-index: 9999;
    }

    /* Modern Rounded Modal Card Box */
    .parental-modal {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 24px;
        width: 100%;
        max-width: 480px;
        box-sizing: border-box;
    }

    /* Premium Navigation Tabs (Adjusted for 4 Tabs) */
    .modal-tabs-header {
        display: flex;
        border-bottom: 2px solid #e2e8f0;
        margin-bottom: 20px;
        gap: 4px;
    }
    .tab-toggle-btn {
        flex: 1;
        padding: 12px 2px;
        background: none;
        border: none;
        font-weight: 600;
        font-size: 12px;
        color: #64748b;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.2s ease;
    }
    .tab-toggle-btn.active-tab {
        color: #1e3a8a;
        border-bottom-color: #3b71ca;
    }

    /* Beautiful Customized Input Fields */
    .nice-input-box {
        width: 100%;
        padding: 12px 14px;
        margin: 8px 0 16px 0;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        color: #334155;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .nice-input-box:focus {
        border-color: #3b71ca;
        box-shadow: 0 0 0 3px rgba(59, 113, 202, 0.15);
    }

    /* Button Custom Styles */
    .action-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }
    .action-btn:active { transform: scale(0.98); }
    
    .btn-blue  { background: #3b71ca; color: white; }
    .btn-blue:hover { background: #2a5298; }
    
    .btn-red   { background: #dc3545; color: white; }
    .btn-red:hover { background: #b02a37; }
    
    .btn-green { background: #198754; color: white; }
    .btn-green:hover { background: #146c43; }
    
    .btn-gray  { background: #6c757d; color: white; }
    .btn-gray:hover { background: #5c636a; }

    /* Hidden Utilities */
    .tab-content-panel { display: none; }
    .tab-content-panel.show-panel { display: block; }
</style>


<!-- 2. THE HTML MARKUP SETUP -->
<div class="parental-modal-overlay">
    <div class="parental-modal">
        
        <!-- Header Section -->
        <h2 style="text-align: center; color: #1e3a8a; margin: 0 0 4px 0;">Parental Security Controls 🔒</h2>
        <p style="text-align: center; color: #64748b; font-size: 13px; margin: 0 0 20px 0;">
            Manage restrictions, user privacy rules, and core account security.
        </p>

        <!-- 4-Tab Header Navigation Links -->
        <div class="modal-tabs-header">
            <button class="tab-toggle-btn active-tab" onclick="changeParentalTab(event, 'school-mode-panel')">School Mode</button>
            <button class="tab-toggle-btn" onclick="changeParentalTab(event, 'user-password-panel')">Update Password</button>
            <button class="tab-toggle-btn" onclick="changeParentalTab(event, 'security-pin-panel')">School PIN</button>
            <button class="tab-toggle-btn" style="color: #dc3545;" onclick="changeParentalTab(event, 'delete-account-panel')">Delete Account</button>
        </div>

        <!-- PANEL 1: School Mode Activation Trigger -->
        <div id="school-mode-panel" class="tab-content-panel show-panel">
            <label style="font-weight: 600; color: #334155; font-size: 14px;">Enter 4-Digit Security PIN:</label>
            <input type="password" id="input-pin-auth" class="nice-input-box" placeholder="••••" maxlength="4">
            
            <button class="action-btn btn-green" onclick="toggleSchoolLockdownMode()">
                Toggle School Mode Status
            </button>
        </div>

        <!-- PANEL 2: Force New Password -->
        <div id="user-password-panel" class="tab-content-panel">
            <label style="font-weight: 600; color: #334155; font-size: 14px;">Overwrite Account Login Password:</label>
            <input type="password" id="input-new-password" class="nice-input-box" placeholder="Type premium new login password">
            
            <button class="action-btn btn-red" onclick="applyAccountPasswordOverride()">
                Force Update Password
            </button>
        </div>

        <!-- PANEL 3: Change School Mode PIN Override -->
        <div id="security-pin-panel" class="tab-content-panel">
            <label style="font-weight: 600; color: #334155; font-size: 14px;">Current 4-Digit PIN:</label>
            <input type="password" id="input-current-pin" class="nice-input-box" placeholder="••••" maxlength="4">
            
            <label style="font-weight: 600; color: #334155; font-size: 14px;">New 4-Digit PIN:</label>
            <input type="password" id="input-new-pin" class="nice-input-box" placeholder="••••" maxlength="4">
            
            <button class="action-btn btn-blue" onclick="changeOperationalPin()">
                Save New Security PIN
            </button>
        </div>

        <!-- PANEL 4: Permanent Account Deletion Engine (NEW TAB) -->
        <div id="delete-account-panel" class="tab-content-panel">
            <div style="background: #fff5f5; border-left: 4px solid #dc3545; padding: 12px; margin-bottom: 15px; border-radius: 6px;">
                <p style="color: #b02a37; font-weight: bold; font-size: 13px; margin: 0 0 4px 0;">⚠️ CRITICAL WARNING</p>
                <p style="color: #c92a2a; font-size: 12px; margin: 0; line-height: 1.4;">
                    This action is absolutely permanent. Your complete user file, saved progress, clean data configurations, and team records will be instantly wiped out.
                </p>
            </div>

            <label style="font-weight: 600; color: #334155; font-size: 13px;">Confirm Security PIN:</label>
            <input type="password" id="input-delete-pin" class="nice-input-box" placeholder="••••" maxlength="4">

            <label style="font-weight: 600; color: #334155; font-size: 13px;">Type <span style="color: #dc3545; font-weight: bold;">DELETE</span> to confirm intent:</label>
            <input type="text" id="input-delete-confirm" class="nice-input-box" placeholder="TYPE DELETE">

            <button class="action-btn btn-red" style="background: #b02a37;" onclick="deleteAccountPermanently()">
                Permanently Destroy Account
            </button>
        </div>

        <!-- Footer Exit Actions -->
        <div style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
            <button class="action-btn btn-gray" onclick="document.querySelector('.parental-modal-overlay').style.display='none'">Exit Setup</button>
        </div>

    </div>
</div>


<!-- 3. JAVASCRIPT LOGIC IMPLEMENTATION -->
<script>
    // System core operational variables
    let savedParentalPin = "1234"; // Master PIN
    let schoolModeEnabled = false;

    // A. Tab-switching core interface logic
    function changeParentalTab(event, targetPanelId) {
        document.querySelectorAll('.tab-content-panel').forEach(panel => {
            panel.classList.remove('show-panel');
        });
        document.querySelectorAll('.tab-toggle-btn').forEach(btn => {
            btn.classList.remove('active-tab');
        });

        document.getElementById(targetPanelId).classList.add('show-panel');
        event.currentTarget.classList.add('active-tab');
    }

    // B. Strict School Mode Controller (Lockdown Engine)
    function toggleSchoolLockdownMode() {
        const pinValue = document.getElementById('input-pin-auth').value;

        if (pinValue !== savedParentalPin) {
            alert("❌ Invalid Parental Security PIN! Action Aborted.");
            return;
        }

        document.getElementById('input-pin-auth').value = "";
        schoolModeEnabled = !schoolModeEnabled;

        executeLockdownProtocol();
    }

    // C. App Lockdown Routine Logic
    function executeLockdownProtocol() {
        const allAppTabs = document.querySelectorAll('.sidebar-tab, .nav-link, .tab-item');
        const clanTeamsModule = document.getElementById('clan-teams-container');

        if (schoolModeEnabled) {
            alert("🔒 School Mode Activated! Non-essential systems are locked down.");

            if (clanTeamsModule) {
                clanTeamsModule.style.display = 'none';
            }

            allAppTabs.forEach(tab => {
                const tabText = tab.textContent.trim().toLowerCase();
                const tabId = tab.id ? tab.id.toLowerCase() : "";

                // EXEMPTIONS: Keep Log Out and Password update options unlocked!
                const isExempt = tabText.includes('log out') || 
                                 tabText.includes('password') || 
                                 tabId.includes('logout') || 
                                 tabId.includes('password');

                if (!isExempt) {
                    tab.classList.remove('active-view', 'selected'); 
                    tab.style.pointerEvents = 'none';
                    tab.style.opacity = '0.15';
                }
            });

        } else {
            alert("🔓 School Mode Deactivated! Full access restored.");

            if (clanTeamsModule) {
                clanTeamsModule.style.display = 'block';
            }

            allAppTabs.forEach(tab => {
                tab.style.pointerEvents = 'auto';
                tab.style.opacity = '1';
            });
        }
    }

    // D. Force Account Password Replacement
    function applyAccountPasswordOverride() {
        const typedPassword = document.getElementById('input-new-password').value;

        if (typedPassword.trim() === "") {
            alert("❌ New account password field cannot be left blank.");
            return;
        }

        alert("✅ Account password updated successfully!");
        document.getElementById('input-new-password').value = "";
    }

    // E. Change School Mode Access PIN Code
    function changeOperationalPin() {
        const matchingCurrentPin = document.getElementById('input-current-pin').value;
        const proposedNewPin = document.getElementById('input-new-pin').value;

        if (matchingCurrentPin !== savedParentalPin) {
            alert("❌ Current PIN validation failed.");
            return;
        }
        if (proposedNewPin.length !== 4 || isNaN(proposedNewPin)) {
            alert("❌ Entry error: The new PIN code must be exactly 4 digits long.");
            return;
        }

        savedParentalPin = proposedNewPin;
        alert("✅ Parental Security PIN updated successfully!");
        document.getElementById('input-current-pin').value = "";
        document.getElementById('input-new-pin').value = "";
    }

    // F. PERMANENT ACCOUNT DELETION SYSTEM (NEW PROTECTION ROUTINE)
    function deleteAccountPermanently() {
        const deletePin = document.getElementById('input-delete-pin').value;
        const deleteConfirmText = document.getElementById('input-delete-confirm').value;

        // Validation Check 1: Security PIN
        if (deletePin !== savedParentalPin) {
            alert("❌ Denied: Security PIN is incorrect.");
            return;
        }

        // Validation Check 2: Precise Text String Match
        if (deleteConfirmText !== "DELETE") {
            alert("❌ Denied: You must type 'DELETE' in all caps to confirm.");
            return;
        }

        // Final Native Modal Warning Safeguard
        const deepCheck = confirm("🚨 STOP AND CONFIRM: Are you 100% sure you want to completely destroy this account? This process cannot be reversed.");
        if (!deepCheck) return;

        // Execute complete profile storage clearing routine
        localStorage.clear();
        sessionStorage.clear();

        alert("💥 Success: Account has been entirely removed from database storage. System reloading...");
        
        // Refresh site view to route user back to entry screen 
        window.location.reload();
    }
</script>
